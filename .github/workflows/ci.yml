name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  vet:
    strategy:
      matrix:
        module: [pgworker, redisworker, grpcworker, telemetryworker, httpserverworker]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.4'
          cache: true
          cache-dependency-path: ${{ matrix.module }}/go.sum
      - name: go vet
        working-directory: ${{ matrix.module }}
        run: go vet ./...

  lint:
    strategy:
      matrix:
        module: [pgworker, redisworker, grpcworker, telemetryworker, httpserverworker]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.4'
          cache: true
          cache-dependency-path: ${{ matrix.module }}/go.sum
      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@latest
      - name: staticcheck
        working-directory: ${{ matrix.module }}
        run: staticcheck ./...

  vulncheck:
    strategy:
      matrix:
        module: [pgworker, redisworker, grpcworker, telemetryworker, httpserverworker]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.4'
          cache: true
          cache-dependency-path: ${{ matrix.module }}/go.sum
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: govulncheck
        working-directory: ${{ matrix.module }}
        run: govulncheck ./...

  test:
    strategy:
      matrix:
        module: [pgworker, redisworker, grpcworker, telemetryworker, httpserverworker]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.4'
          cache: true
          cache-dependency-path: ${{ matrix.module }}/go.sum
      - name: go test
        working-directory: ${{ matrix.module }}
        run: go test -v -count=1 -coverprofile=coverage.txt -race ./...
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-${{ matrix.module }}
          path: ${{ matrix.module }}/coverage.txt

  coverage:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v4
      - uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: alesr/svcworkers
          directory: .
          fail_ci_if_error: true
